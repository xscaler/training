<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FF4F00" stroke-width="0.15" opacity="0.18"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#FF4F00" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left orange accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#FF4F00"/>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="#FF4F00" opacity="0.35"/>

  <!-- xScaler logo mark — centred-left, scaled up 4× from 100×100 viewBox -->
  <g transform="translate(96, 215) scale(2.0)">
    <path d="M50 44C48 34 42 22 34 16" stroke="#FF4F00" stroke-width="4" stroke-linecap="round"/>
    <circle cx="34" cy="16" r="6" fill="#FF4F00"/>
    <path d="M54 52C62 56 74 60 82 58" stroke="#FF4F00" stroke-width="4" stroke-linecap="round"/>
    <circle cx="82" cy="58" r="6" fill="#FF4F00"/>
    <path d="M46 54C40 62 30 74 22 80" stroke="#FF4F00" stroke-width="4" stroke-linecap="round"/>
    <circle cx="22" cy="80" r="6" fill="#FF4F00"/>
    <path d="M38 20C56 18 72 30 80 52" stroke="#FF4F00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M78 62C68 78 48 86 26 78" stroke="#FF4F00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M20 74C14 52 22 30 36 20" stroke="#FF4F00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="50" cy="50" r="8" fill="#FF4F00"/>
  </g>

  <!-- Site name -->
  <text x="96" y="412"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="-1"
    fill="#FFFFFF">xScaler Labs</text>

  <!-- Divider -->
  <rect x="96" y="432" width="480" height="3" fill="#FF4F00" rx="2"/>

  <!-- Tagline -->
  <text x="96" y="490"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30"
    font-weight="400"
    fill="#999999">Managed Metrics Backend</text>

  <text x="96" y="532"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30"
    font-weight="400"
    fill="#999999">Prometheus-compatible · Built for scale</text>

  <!-- Domain badge — bottom right -->
  <text x="1104" y="596"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="22"
    font-weight="500"
    fill="#FF4F00"
    text-anchor="end">docs.xscalerlabs.com</text>

</svg>
