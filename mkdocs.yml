    - "Lab 02 — Agent Deployment": labs/lab-02-agent-deployment.md
    - "Lab 03 — Agent Registration": labs/lab-03-registration.md
    - "Lab 04 — Grafana Setup": labs/lab-04-grafana.md
    - "Lab 05 — Dashboard Creation": labs/lab-05-dashboard.md
