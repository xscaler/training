  - Getting Started: getting-started.md

  - "Session 1 — Platform Introduction":
    - Overview: session-1/overview.md
    - Platform Introduction: session-1/platform-introduction.md
    - User Management: session-1/user-management.md
    - Observability Fundamentals: session-1/observability-fundamentals.md

  - "Session 2 — OpenTelemetry Fundamentals":
    - Overview: session-2/overview.md
    - OTel Overview: session-2/otel-overview.md
    - Collector Components: session-2/collector-components.md
    - Deployment Models: session-2/deployment-models.md
    - Agent vs Gateway: session-2/agent-vs-gateway.md

  - "Session 3 — Data Collection Architecture":
    - Overview: session-3/overview.md
    - Metrics Collection: session-3/metrics-collection.md
    - Architecture Review: session-3/architecture-review.md
    - Customer Workshop: session-3/customer-workshop.md

  - "Session 4 — Tenant Setup and Agent Deployment":
    - Overview: session-4/overview.md
    - Tenant Administration: session-4/tenant-administration.md
    - Agent Deployment: session-4/agent-deployment.md
    - Agent Registration: session-4/agent-registration.md
    - Configuration Management: session-4/configuration-management.md

  - "Session 5 — Grafana Integration":
    - Overview: session-5/overview.md
    - Grafana Overview: session-5/grafana-overview.md
    - Deployment Options: session-5/deployment-options.md
    - Datasource Configuration: session-5/datasource-configuration.md

  - "Session 6 — Dashboards, APM and Alerting":
    - Overview: session-6/overview.md
    - Dashboard Creation: session-6/dashboard-creation.md
    - APM: session-6/apm.md
    - Alerting: session-6/alerting.md

  - "Session 7 — Hands-On Lab and Q&A":
